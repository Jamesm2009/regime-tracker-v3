server {
    listen 80;
    listen [::]:80;
    server_name regime-tracker.market-dashboards.com;

    # Redirect HTTP to HTTPS (after certbot setup)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name regime-tracker.market-dashboards.com;

    # SSL — certbot will populate these automatically
    ssl_certificate     /etc/letsencrypt/live/regime-tracker.market-dashboards.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/regime-tracker.market-dashboards.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/regime-tracker;
    index index.html;

    # Serve data.json directly (written by cron nightly)
    location = /data.json {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }    
    location /yf/ {
        proxy_pass https://query1.finance.yahoo.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host query1.finance.yahoo.com;
        proxy_set_header User-Agent "Mozilla/5.0 (compatible)";
        add_header Access-Control-Allow-Origin *;
    }
}

    # Proxy /api/subscribe to the Node.js subscribe server
    location /api/subscribe {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Serve the dashboard
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;
}
