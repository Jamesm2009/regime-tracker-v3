server {
    server_name regime-tracker.market-dashboards.com;

    root  /var/www/regime-tracker;
    index index.html;

    location = /data.json {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    location /api/subscribe {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location /yf/ {
        proxy_pass https://query1.finance.yahoo.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host query1.finance.yahoo.com;
        proxy_set_header User-Agent "Mozilla/5.0 (compatible)";
        add_header Access-Control-Allow-Origin *;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript application/json;

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/regime-tracker.market-dashboards.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/regime-tracker.market-dashboards.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = regime-tracker.market-dashboards.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name regime-tracker.market-dashboards.com;
    return 404; # managed by Certbot
}
